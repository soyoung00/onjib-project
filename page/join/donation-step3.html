<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../assets/css/join/donation.css">
</head>

<body>
    <!-- 후원하기 3 단계 -->


    <div class="bnf_M1">
        <p><img src="../../assets/img/join/donation.jpg" alt=""></p>
        <div class="text-box">
            <span class="title">후원하기</span>
            <span class="sub">후원자님의 마음, <br>아이들에겐 안전과 희망이 됩니다.</span>
        </div>
    </div>

    <ul class="step">
        <li class="step-item">1</li>
        <li class="step-line"></li>
        <li class="step-item">2</li>
        <li class="step-line"></li>
        <li class="step-item active">3</li>
    </ul>

    <div class="step3-group">
        <svg class="check-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- 회색 배경 원 & 체크 -->
            <circle class="ring-gray" cx="50" cy="50" r="46" />
            <path class="check-gray" d="M27 52 L43 67 L73 34" />
            <!-- 주황 오버레이 -->
            <circle class="ring-color" cx="50" cy="50" r="46" />
            <path class="check-color" d="M27 52 L43 67 L73 34" />
        </svg>
        <div class="complete-text">
            <p>후원이 완료되었습니다.</p>
            <p>감사합니다.</p>
        </div>
        <a href="../../index.html" class="home-btn">
            홈으로
        </a>
    </div>



</body>

</html>
